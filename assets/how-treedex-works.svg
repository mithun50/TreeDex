<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="#fafafa"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="56" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="20" width="900" height="36" fill="url(#headerGrad)"/>
  <text x="450" y="36" text-anchor="middle" fill="white" font-size="20" font-weight="700">How TreeDex Works</text>

  <!-- Step 1: Document -->
  <rect x="40" y="80" width="150" height="80" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="108" text-anchor="middle" fill="#6366f1" font-size="22">&#x1F4C4;</text>
  <text x="115" y="132" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="600">Document</text>
  <text x="115" y="148" text-anchor="middle" fill="#64748b" font-size="11">PDF / TXT / HTML / DOCX</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="120" x2="230" y2="120" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Pages + Headings -->
  <rect x="240" y="80" width="170" height="80" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="325" y="108" text-anchor="middle" fill="#6366f1" font-size="22">&#x1F4D1;</text>
  <text x="325" y="132" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="600">Extract Pages</text>
  <text x="325" y="148" text-anchor="middle" fill="#64748b" font-size="11">[H1] [H2] [H3] font markers</text>

  <!-- Arrow 2 -->
  <line x1="410" y1="120" x2="450" y2="120" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: ToC detection / branching -->
  <rect x="460" y="76" width="180" height="88" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="100" text-anchor="middle" fill="#059669" font-size="12" font-weight="700">PDF has ToC?</text>

  <!-- YES branch (down-left) -->
  <text x="498" y="140" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="600">YES</text>
  <line x1="498" y1="148" x2="498" y2="195" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- NO branch (right) -->
  <text x="610" y="126" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="600">NO</text>
  <line x1="640" y1="120" x2="680" y2="120" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- YES path: Direct tree from ToC -->
  <rect x="420" y="205" width="180" height="64" rx="10" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="510" y="230" text-anchor="middle" fill="#065f46" font-size="12" font-weight="600">Build from ToC</text>
  <text x="510" y="248" text-anchor="middle" fill="#047857" font-size="11">Zero LLM calls needed</text>

  <!-- Arrow from ToC path to tree -->
  <line x1="510" y1="269" x2="510" y2="305" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- NO path: LLM extraction -->
  <rect x="690" y="80" width="180" height="80" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="780" y="108" text-anchor="middle" fill="#6366f1" font-size="22">&#x1F9E0;</text>
  <text x="780" y="132" text-anchor="middle" fill="#4c1d95" font-size="13" font-weight="600">LLM: Extract Structure</text>
  <text x="780" y="148" text-anchor="middle" fill="#6d28d9" font-size="11">Heading-guided, capped context</text>

  <!-- Arrow down from LLM to repair -->
  <line x1="780" y1="160" x2="780" y2="200" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Orphan repair step -->
  <rect x="690" y="205" width="180" height="64" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="780" y="230" text-anchor="middle" fill="#9a3412" font-size="12" font-weight="600">Repair Orphans</text>
  <text x="780" y="248" text-anchor="middle" fill="#c2410c" font-size="11">Insert synthetic parents</text>

  <!-- Arrow from repair to tree -->
  <line x1="780" y1="269" x2="780" y2="305" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Tree Building (merged destination) -->
  <rect x="420" y="315" width="440" height="80" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="343" text-anchor="middle" fill="#6366f1" font-size="22">&#x1F333;</text>
  <text x="640" y="367" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="600">Build Tree Index</text>
  <text x="640" y="383" text-anchor="middle" fill="#64748b" font-size="11">hierarchy + page ranges + embedded text</text>

  <!-- Arrow left from tree -->
  <line x1="420" y1="355" x2="380" y2="355" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Tree visualization -->
  <rect x="40" y="300" width="330" height="120" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205" y="324" text-anchor="middle" fill="#166534" font-size="12" font-weight="600">Tree Structure</text>

  <!-- Tree nodes -->
  <rect x="165" y="334" width="80" height="24" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="205" y="350" text-anchor="middle" fill="#166534" font-size="10">Document</text>

  <line x1="165" y1="358" x2="100" y2="370" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="245" y1="358" x2="310" y2="370" stroke="#22c55e" stroke-width="1.5"/>

  <rect x="55" y="370" width="100" height="22" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="105" y="385" text-anchor="middle" fill="#166534" font-size="10">Ch 1 (p.1-8)</text>

  <rect x="255" y="370" width="100" height="22" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="305" y="385" text-anchor="middle" fill="#166534" font-size="10">Ch 2 (p.9-18)</text>

  <line x1="70" y1="392" x2="60" y2="400" stroke="#22c55e" stroke-width="1"/>
  <line x1="130" y1="392" x2="155" y2="400" stroke="#22c55e" stroke-width="1"/>

  <rect x="40" y="400" width="55" height="16" rx="3" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="0.5"/>
  <text x="68" y="411" text-anchor="middle" fill="#166534" font-size="9">1.1</text>

  <rect x="130" y="400" width="55" height="16" rx="3" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="0.5"/>
  <text x="158" y="411" text-anchor="middle" fill="#166534" font-size="9">1.2</text>

  <!-- Arrow down to query -->
  <line x1="450" y1="395" x2="450" y2="445" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 6: Query -->
  <rect x="40" y="455" width="400" height="80" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="240" y="483" text-anchor="middle" fill="#6366f1" font-size="22">&#x1F4AC;</text>
  <text x="240" y="507" text-anchor="middle" fill="#4c1d95" font-size="13" font-weight="600">Query: "What methods were used?"</text>
  <text x="240" y="523" text-anchor="middle" fill="#6d28d9" font-size="11">LLM selects relevant tree nodes</text>

  <!-- Arrow right to result -->
  <line x1="440" y1="495" x2="480" y2="495" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 7: Result -->
  <rect x="490" y="450" width="370" height="100" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="478" text-anchor="middle" fill="#92400e" font-size="13" font-weight="700">QueryResult</text>
  <text x="675" y="496" text-anchor="middle" fill="#78350f" font-size="11">.context = "Methods section text..."</text>
  <text x="675" y="512" text-anchor="middle" fill="#78350f" font-size="11">.pages_str = "pages 18-25"</text>
  <text x="675" y="528" text-anchor="middle" fill="#78350f" font-size="11">.reasoning = "Section 2 covers methodology"</text>
  <text x="675" y="544" text-anchor="middle" fill="#78350f" font-size="11">.node_ids = ["0007", "0008"]</text>

  <!-- Bottom labels -->
  <text x="450" y="590" text-anchor="middle" fill="#94a3b8" font-size="11">TreeDex — Tree-based Vectorless RAG</text>
  <text x="450" y="608" text-anchor="middle" fill="#a5b4c6" font-size="10">Smart hierarchy: PDF ToC shortcut | Font-size heading markers | Orphan repair | Capped continuation</text>
</svg>
