<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" rx="12" fill="#fafafa"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="56" rx="12" fill="url(#hg)"/>
  <rect x="0" y="20" width="900" height="36" fill="url(#hg)"/>
  <text x="450" y="36" text-anchor="middle" fill="white" font-size="20" font-weight="700">TreeDex Architecture</text>

  <!-- Layer 1: Document Loaders -->
  <rect x="40" y="80" width="820" height="80" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#sh)"/>
  <text x="60" y="102" fill="#1e40af" font-size="13" font-weight="700">Document Loaders</text>
  <text x="60" y="118" fill="#3b82f6" font-size="11">treedex/loaders.py</text>

  <rect x="60" y="128" width="100" height="24" rx="4" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="110" y="144" text-anchor="middle" fill="#1e40af" font-size="11">PDFLoader</text>

  <rect x="170" y="128" width="100" height="24" rx="4" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="220" y="144" text-anchor="middle" fill="#1e40af" font-size="11">TextLoader</text>

  <rect x="280" y="128" width="100" height="24" rx="4" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="330" y="144" text-anchor="middle" fill="#1e40af" font-size="11">HTMLLoader</text>

  <rect x="390" y="128" width="100" height="24" rx="4" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="440" y="144" text-anchor="middle" fill="#1e40af" font-size="11">DOCXLoader</text>

  <rect x="500" y="128" width="110" height="24" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="555" y="144" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="600">auto_loader()</text>

  <!-- Arrow down -->
  <line x1="450" y1="160" x2="450" y2="190" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 2: PDF Parser + Smart Detection -->
  <rect x="40" y="196" width="400" height="85" rx="10" fill="#fefce8" stroke="#fde047" stroke-width="1.5" filter="url(#sh)"/>
  <text x="60" y="218" fill="#854d0e" font-size="13" font-weight="700">PDF Parser + Smart Detection</text>
  <text x="60" y="234" fill="#a16207" font-size="11">treedex/pdf_parser.py</text>

  <rect x="60" y="244" width="110" height="20" rx="3" fill="white" stroke="#fde047" stroke-width="0.5"/>
  <text x="115" y="258" text-anchor="middle" fill="#78350f" font-size="9">extract_pages()</text>
  <rect x="178" y="244" width="90" height="20" rx="3" fill="white" stroke="#fde047" stroke-width="0.5"/>
  <text x="223" y="258" text-anchor="middle" fill="#78350f" font-size="9">extract_toc()</text>
  <rect x="276" y="244" width="148" height="20" rx="3" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="350" y="258" text-anchor="middle" fill="#854d0e" font-size="9" font-weight="600">[H1] [H2] [H3] markers</text>

  <!-- Layer 2b: LLM Backends -->
  <rect x="460" y="196" width="400" height="85" rx="10" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.5" filter="url(#sh)"/>
  <text x="480" y="218" fill="#9d174d" font-size="13" font-weight="700">LLM Backends (18+)</text>
  <text x="480" y="234" fill="#be185d" font-size="11">treedex/llm_backends.py</text>

  <rect x="480" y="244" width="58" height="18" rx="3" fill="white" stroke="#f9a8d4" stroke-width="0.5"/>
  <text x="509" y="256" text-anchor="middle" fill="#9d174d" font-size="8">Gemini</text>
  <rect x="543" y="244" width="58" height="18" rx="3" fill="white" stroke="#f9a8d4" stroke-width="0.5"/>
  <text x="572" y="256" text-anchor="middle" fill="#9d174d" font-size="8">OpenAI</text>
  <rect x="606" y="244" width="58" height="18" rx="3" fill="white" stroke="#f9a8d4" stroke-width="0.5"/>
  <text x="635" y="256" text-anchor="middle" fill="#9d174d" font-size="8">Claude</text>
  <rect x="669" y="244" width="46" height="18" rx="3" fill="white" stroke="#f9a8d4" stroke-width="0.5"/>
  <text x="692" y="256" text-anchor="middle" fill="#9d174d" font-size="8">Groq</text>
  <rect x="720" y="244" width="46" height="18" rx="3" fill="white" stroke="#f9a8d4" stroke-width="0.5"/>
  <text x="743" y="256" text-anchor="middle" fill="#9d174d" font-size="8">Ollama</text>
  <rect x="771" y="244" width="70" height="18" rx="3" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
  <text x="806" y="256" text-anchor="middle" fill="#9d174d" font-size="8" font-weight="600">Any URL</text>

  <!-- Arrows down -->
  <line x1="240" y1="281" x2="240" y2="311" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="660" y1="281" x2="660" y2="311" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 3: Prompts -->
  <rect x="460" y="317" width="400" height="56" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#sh)"/>
  <text x="480" y="339" fill="#166534" font-size="13" font-weight="700">Prompt Templates</text>
  <text x="480" y="357" fill="#16a34a" font-size="10">STRUCTURE_EXTRACTION | CONTINUE (capped) | RETRIEVAL</text>

  <!-- Layer 3b: Tree Builder + Utils -->
  <rect x="40" y="317" width="200" height="56" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#sh)"/>
  <text x="60" y="339" fill="#166534" font-size="13" font-weight="700">Tree Builder</text>
  <text x="60" y="357" fill="#16a34a" font-size="10">list_to_tree | toc_to_sections</text>

  <rect x="250" y="317" width="200" height="56" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#sh)"/>
  <text x="270" y="339" fill="#9a3412" font-size="13" font-weight="700">Tree Repair</text>
  <text x="270" y="357" fill="#c2410c" font-size="10">repair_orphans | node_map | utils</text>

  <!-- Arrows down to core -->
  <line x1="140" y1="373" x2="140" y2="403" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="350" y1="373" x2="350" y2="403" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="373" x2="660" y2="403" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 4: Core -->
  <rect x="40" y="409" width="820" height="130" rx="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2" filter="url(#sh)"/>
  <text x="60" y="433" fill="#4c1d95" font-size="15" font-weight="700">TreeDex Core</text>
  <text x="60" y="451" fill="#6d28d9" font-size="11">treedex/core.py</text>

  <!-- Core methods -->
  <rect x="60" y="463" width="120" height="26" rx="5" fill="white" stroke="#c4b5fd" stroke-width="1"/>
  <text x="120" y="480" text-anchor="middle" fill="#4c1d95" font-size="11" font-weight="600">.from_file()</text>

  <rect x="190" y="463" width="120" height="26" rx="5" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="250" y="480" text-anchor="middle" fill="#065f46" font-size="11" font-weight="600">._from_toc()</text>

  <rect x="320" y="463" width="120" height="26" rx="5" fill="white" stroke="#c4b5fd" stroke-width="1"/>
  <text x="380" y="480" text-anchor="middle" fill="#4c1d95" font-size="11" font-weight="600">.from_pages()</text>

  <rect x="450" y="463" width="100" height="26" rx="5" fill="white" stroke="#c4b5fd" stroke-width="1"/>
  <text x="500" y="480" text-anchor="middle" fill="#4c1d95" font-size="11" font-weight="600">.query()</text>

  <rect x="560" y="463" width="90" height="26" rx="5" fill="white" stroke="#c4b5fd" stroke-width="1"/>
  <text x="605" y="480" text-anchor="middle" fill="#4c1d95" font-size="11" font-weight="600">.save()</text>

  <rect x="660" y="463" width="90" height="26" rx="5" fill="white" stroke="#c4b5fd" stroke-width="1"/>
  <text x="705" y="480" text-anchor="middle" fill="#4c1d95" font-size="11" font-weight="600">.load()</text>

  <rect x="760" y="463" width="90" height="26" rx="5" fill="white" stroke="#c4b5fd" stroke-width="1"/>
  <text x="805" y="480" text-anchor="middle" fill="#4c1d95" font-size="11" font-weight="600">.show_tree()</text>

  <!-- ToC fast path label -->
  <rect x="60" y="498" width="250" height="22" rx="4" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="185" y="513" text-anchor="middle" fill="#059669" font-size="10" font-weight="600">PDF ToC found? Skip LLM, build tree directly</text>

  <rect x="320" y="498" width="150" height="22" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="0.5"/>
  <text x="395" y="513" text-anchor="middle" fill="#6d28d9" font-size="10">QueryResult | .stats()</text>

  <!-- Arrow down to output -->
  <line x1="450" y1="539" x2="450" y2="569" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 5: Output -->
  <rect x="100" y="575" width="700" height="56" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5" filter="url(#sh)"/>
  <text x="450" y="601" text-anchor="middle" fill="#92400e" font-size="13" font-weight="700">QueryResult: .context  .node_ids  .page_ranges  .pages_str  .reasoning  .answer</text>
  <text x="450" y="619" text-anchor="middle" fill="#a16207" font-size="11">Ready for your LLM's generation step or direct use</text>

  <!-- Footer -->
  <text x="450" y="660" text-anchor="middle" fill="#94a3b8" font-size="11">All modules are independent — use any part standalone</text>
  <text x="450" y="678" text-anchor="middle" fill="#a5b4c6" font-size="10">Smart hierarchy: PDF ToC shortcut | Font-size heading markers | Orphan repair | Capped continuation</text>
</svg>
